<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Crew OS — Crew Cockpit</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; font-family: "Geist", -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  * { box-sizing: border-box; }
  #root { height: 100%; }

  /* Make sure the AppShell card inside the artboard fills its box */
  .cc-frame { width: 100%; height: 100%; overflow: hidden; }

  /* Page intro header */
  .cc-intro {
    max-width: 1100px;
    margin: 32px auto 8px;
    padding: 0 28px;
    font-family: "Geist", -apple-system, system-ui, sans-serif;
    color: #2a251f;
  }
  .cc-intro h1 { font-size: 22px; font-weight: 500; margin: 0 0 6px 0; letter-spacing: -0.01em; }
  .cc-intro p  { font-size: 13px; color: rgba(60,50,40,0.7); margin: 0; max-width: 720px; line-height: 1.5; }
  .cc-intro .meta { margin-top: 10px; display: flex; gap: 14px; font-size: 11px; color: rgba(60,50,40,0.55); }
  .cc-intro .meta span::before { content: '·'; margin-right: 14px; }
  .cc-intro .meta span:first-child::before { content: ''; margin: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="spotlight-block.jsx"></script>
<script type="text/babel" src="cockpit.jsx"></script>
<script type="text/babel" src="cockpit-states.jsx"></script>

<script type="text/babel" data-presets="env,react">
function Frame({ state }) {
  return (
    <div className="cc-frame" data-screen-label={`Cockpit · ${state._label}`}>
      <AppShell user={{ name: state.me.name }} topbarSubtitle={state.me.name}>
        <Cockpit data={state} />
      </AppShell>
    </div>
  );
}

const states = [
  { id: 'onboarding', label: 'Onboarding', subtitle: "Sara · Day 6 of 90 — tracker shown, allocation light", data: STATE_ONBOARDING },
  { id: 'active',     label: 'Active',     subtitle: "Tomás · steady employee — tracker hidden, fuller load", data: STATE_ACTIVE },
  { id: 'overloaded', label: 'Overloaded', subtitle: "Maya · 125% across four projects — allocation red", data: STATE_OVERLOADED },
  { id: 'empty',      label: 'Empty',      subtitle: "Lyra · Day 1 — calm placeholders, not broken panels", data: STATE_EMPTY },
  { id: 'wrapping',   label: 'Wrapping up',subtitle: "Noah · Day 84 of 90 — handoff nudge surfaced", data: STATE_WRAPPING },
];
states.forEach(s => s.data._label = s.label);

const ARTBOARD_W = 1440;
const ARTBOARD_H = 1300;

function Page() {
  return (
    <React.Fragment>
      <div className="cc-intro">
        <h1>Crew Cockpit</h1>
        <p>
          The first screen every person sees on login. Single column, ~980px, six
          stacked blocks ordered by urgency — ending with the Spotlight. Read-mostly —
          links out to the board, timeline, and handoff editors rather than hosting them.
        </p>
        <div className="meta">
          <span>SKAM dark theme</span>
          <span>Shared components only</span>
          <span>5-second test: name, day count, what's overdue, what's blocked</span>
        </div>
      </div>
      <DesignCanvas>
        <DCSection id="cockpit" title="Crew Cockpit" subtitle="One person, five states">
          {states.map(s => (
            <DCArtboard
              key={s.id}
              id={s.id}
              label={`${s.label} — ${s.subtitle}`}
              width={ARTBOARD_W}
              height={ARTBOARD_H}
            >
              <Frame state={s.data} />
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
