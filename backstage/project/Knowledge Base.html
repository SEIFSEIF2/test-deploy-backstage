<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<title>Crew OS — Knowledge base</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; font-family: "Geist", -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
  .kb-frame { width: 100%; height: 100%; overflow: hidden; }
  .kb-intro { max-width: 1100px; margin: 32px auto 8px; padding: 0 28px; color: #2a251f; }
  .kb-intro h1 { font-size: 22px; font-weight: 500; margin: 0 0 6px 0; letter-spacing: -0.01em; }
  .kb-intro p  { font-size: 13px; color: rgba(60,50,40,0.7); margin: 0; max-width: 720px; line-height: 1.5; }
  .kb-intro .meta { margin-top: 10px; display: flex; gap: 14px; font-size: 11px; color: rgba(60,50,40,0.55); flex-wrap: wrap; }
  .kb-intro .meta span::before { content: '·'; margin-right: 14px; }
  .kb-intro .meta span:first-child::before { content: ''; margin: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="knowledge.jsx"></script>
<script type="text/babel" src="knowledge-list.jsx"></script>
<script type="text/babel" src="knowledge-states.jsx"></script>

<script type="text/babel" data-presets="env,react">
const ARTBOARD_W = 1480;
const ARTBOARD_H = 1280;

const states = [
  { id: 'all',       label: 'Default — all docs',                          data: KB_DEFAULT, view: 'all' },
  { id: 'attention', label: 'Needs attention — stale, expired, unowned',   data: KB_DEFAULT, view: 'attention' },
  { id: 'gaps',      label: 'Knowledge gaps — unanswered questions',        data: KB_DEFAULT, view: 'gaps' },
  { id: 'empty',     label: 'Empty — first-run, import or write the first', data: KB_EMPTY,   view: 'all' },
];

function Page() {
  return (
    <React.Fragment>
      <div className="kb-intro">
        <h1>Knowledge base <span style={{fontSize:12,color:'rgba(60,50,40,0.55)',marginLeft:8}}>§6.6 · light theme</span></h1>
        <p>
          Single source of truth for SOPs, role guides, and policies — also
          what the AI assistant reads. Five verification states, four tabs
          (All / Mine / Needs attention / Knowledge gaps), a sharp first-run
          import flow, and unanswered questions surface as a queue of docs
          to write.
        </p>
        <div className="meta">
          <span>SKAM light</span>
          <span>Verification statuses use the same StatusPill idiom</span>
          <span>Red is reserved for expired verification and unowned docs</span>
        </div>
      </div>
      <DesignCanvas>
        <DCSection id="knowledge" title="Knowledge base" subtitle="All · Needs attention · Knowledge gaps · Empty">
          {states.map(s => (
            <DCArtboard key={s.id} id={s.id} label={s.label} width={ARTBOARD_W} height={ARTBOARD_H}>
              <div className="kb-frame" data-screen-label={`Knowledge base · ${s.label}`}>
                <AppShell active="knowledge" subActive="kb" user={{ name: 'Ada Brennan' }} topbarCrumbs={['Knowledge']}>
                  <KnowledgeBase data={s.data} view={s.view} />
                </AppShell>
              </div>
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
