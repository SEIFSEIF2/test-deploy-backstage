<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<title>Crew OS — AI assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; font-family: "Geist", -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
  .ai-frame { width: 100%; height: 100%; overflow: hidden; }
  .ai-intro { max-width: 1100px; margin: 32px auto 8px; padding: 0 28px; color: #2a251f; }
  .ai-intro h1 { font-size: 22px; font-weight: 500; margin: 0 0 6px 0; letter-spacing: -0.01em; }
  .ai-intro p  { font-size: 13px; color: rgba(60,50,40,0.7); margin: 0; max-width: 720px; line-height: 1.5; }
  .ai-intro .meta { margin-top: 10px; display: flex; gap: 14px; font-size: 11px; color: rgba(60,50,40,0.55); flex-wrap: wrap; }
  .ai-intro .meta span::before { content: '·'; margin-right: 14px; }
  .ai-intro .meta span:first-child::before { content: ''; margin: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="assistant.jsx"></script>
<script type="text/babel" src="assistant-parts.jsx"></script>
<script type="text/babel" src="assistant-states.jsx"></script>

<script type="text/babel" data-presets="env,react">
const ARTBOARD_W = 1400;
const ARTBOARD_H = 1100;

const states = [
  { id: 'sourced',   label: 'Sourced answers — the happy path',                       data: ASSIST_SOURCED   },
  { id: 'unsourced', label: 'Low-confidence answer — no source, "verify" treatment',  data: ASSIST_UNSOURCED },
  { id: 'gap',       label: 'Captured as a knowledge gap — no answer, logged',         data: ASSIST_GAP       },
  { id: 'empty',     label: 'Empty — first run, suggested questions',                  data: ASSIST_EMPTY     },
];

function Page() {
  return (
    <React.Fragment>
      <div className="ai-intro">
        <h1>AI assistant <span style={{fontSize:12,color:'rgba(60,50,40,0.55)',marginLeft:8}}>§6.8 · light theme · last build</span></h1>
        <p>
          A role-aware ask-and-answer panel scoped to what the viewer can see.
          Every answer wears its sources. An answer without sources looks
          visibly less certain. A question with nothing to lean on becomes
          a knowledge gap, not a guess.
        </p>
        <div className="meta">
          <span>SKAM light</span>
          <span>Sources are clickable cards back into the Knowledge base</span>
          <span>The assistant never invents — it logs gaps instead</span>
        </div>
      </div>
      <DesignCanvas>
        <DCSection id="assistant" title="AI assistant" subtitle="Sourced · low-confidence · gap · empty">
          {states.map(s => (
            <DCArtboard key={s.id} id={s.id} label={s.label} width={ARTBOARD_W} height={ARTBOARD_H}>
              <div className="ai-frame" data-screen-label={`AI assistant · ${s.label}`}>
                <AppShell active="knowledge" subActive="assistant" user={{ name: s.data.viewer }} topbarCrumbs={['Knowledge', 'Assistant']}>
                  <AIAssistant data={s.data} />
                </AppShell>
              </div>
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
