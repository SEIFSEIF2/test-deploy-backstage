<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<title>Crew OS — Crew profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; font-family: "Geist", -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
  .cp-frame { width: 100%; height: 100%; overflow: hidden; }
  .cp-intro { max-width: 1100px; margin: 32px auto 8px; padding: 0 28px; font-family: "Geist", -apple-system, system-ui, sans-serif; color: #2a251f; }
  .cp-intro h1 { font-size: 22px; font-weight: 500; margin: 0 0 6px 0; letter-spacing: -0.01em; }
  .cp-intro p  { font-size: 13px; color: rgba(60,50,40,0.7); margin: 0; max-width: 720px; line-height: 1.5; }
  .cp-intro .meta { margin-top: 10px; display: flex; gap: 14px; font-size: 11px; color: rgba(60,50,40,0.55); flex-wrap: wrap; }
  .cp-intro .meta span::before { content: '·'; margin-right: 14px; }
  .cp-intro .meta span:first-child::before { content: ''; margin: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="crew-profile-header.jsx"></script>
<script type="text/babel" src="crew-profile-sections.jsx"></script>
<script type="text/babel" src="crew-profile.jsx"></script>
<script type="text/babel" src="crew-profile-states.jsx"></script>

<script type="text/babel" data-presets="env,react">
const ARTBOARD_W = 1280;
const ARTBOARD_H = 1500;

const states = [
  { id: 'active',     label: 'Active — Tomás (lead colorist)',          data: PROFILE_ACTIVE,    user: 'Ada Brennan',  self: false },
  { id: 'wrapping',   label: 'Wrapping up — Noah (Day 84 of 90)',       data: PROFILE_WRAPPING,  user: 'Ada Brennan',  self: false },
  { id: 'incoming',   label: 'Incoming — Lyra (starts in 12 days)',     data: PROFILE_INCOMING,  user: 'Ada Brennan',  self: false },
  { id: 'alumni',     label: 'Alumni — Iris (Jan–Apr 2026)',            data: PROFILE_ALUMNI,    user: 'Ada Brennan',  self: false },
];

function Page() {
  return (
    <React.Fragment>
      <div className="cp-intro">
        <h1>Crew profile <span style={{fontSize:12,color:'rgba(60,50,40,0.55)',marginLeft:8}}>§6.4 · light theme</span></h1>
        <p>
          One person's full record. Skills with levels (the "skill tree"),
          availability, current allocations, contribution log, and any
          redeployment history. Four lifecycle states; the actions in the
          header and the headline section change to match.
        </p>
        <div className="meta">
          <span>SKAM light — same components, re-skinned</span>
          <span>Allocation bar is the same one used on the Cockpit</span>
          <span>Red appears only on self-identity, overdue, critical</span>
        </div>
      </div>
      <DesignCanvas>
        <DCSection id="crew-profile" title="Crew profile" subtitle="One pattern, four lifecycle states">
          {states.map(s => (
            <DCArtboard key={s.id} id={s.id} label={s.label} width={ARTBOARD_W} height={ARTBOARD_H}>
              <div className="cp-frame" data-screen-label={`Crew profile · ${s.label}`}>
                <AppShell active="crew" subActive="profile" user={{ name: s.user }} topbarCrumbs={['Crew', s.data.name]}>
                  <CrewProfile profile={s.data} viewerIsSelf={s.self} />
                </AppShell>
              </div>
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
