<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<title>Crew OS — Vault</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; font-family: "Geist", -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
  .v-frame { width: 100%; height: 100%; overflow: hidden; }
  .v-intro { max-width: 1100px; margin: 32px auto 8px; padding: 0 28px; color: #2a251f; }
  .v-intro h1 { font-size: 22px; font-weight: 500; margin: 0 0 6px 0; letter-spacing: -0.01em; }
  .v-intro p  { font-size: 13px; color: rgba(60,50,40,0.7); margin: 0; max-width: 720px; line-height: 1.5; }
  .v-intro .meta { margin-top: 10px; display: flex; gap: 14px; font-size: 11px; color: rgba(60,50,40,0.55); flex-wrap: wrap; }
  .v-intro .meta span::before { content: '·'; margin-right: 14px; }
  .v-intro .meta span:first-child::before { content: ''; margin: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="vault.jsx"></script>
<script type="text/babel" src="vault-sidebar.jsx"></script>
<script type="text/babel" src="vault-compose.jsx"></script>
<script type="text/babel" src="vault-detail.jsx"></script>
<script type="text/babel" src="vault-states.jsx"></script>

<script type="text/babel" data-presets="env,react">
const ARTBOARD_W = 1480;
const ARTBOARD_H = 1500;

const states = [
  { id: 'default', label: 'Default — mixed feed, contributor rail',         data: VAULT_DEFAULT, view: 'all' },
  { id: 'fresh',   label: 'A fresh post — no votes or comments yet',         data: VAULT_FRESH,   view: 'all' },
  { id: 'empty',   label: 'Empty — first-run, "share the first thing"',     data: VAULT_EMPTY,   view: 'all' },
];

function Page() {
  return (
    <React.Fragment>
      <div className="v-intro">
        <h1>Vault <span style={{fontSize:12,color:'rgba(60,50,40,0.55)',marginLeft:8}}>§6.7 · light theme</span></h1>
        <p>
          The culture space — ideas, quotes, inspiration, sources, and side
          projects. Light upvotes and comments, a kind-filtered feed, and a
          right rail that highlights this month's top Vault contributors —
          explicitly separate from the company Spotlight (§6.9).
        </p>
        <div className="meta">
          <span>SKAM light</span>
          <span>Kind tags reuse the StatusPill shape; one pattern per job</span>
          <span>Empty state offers a kind picker, not a blank "+" button</span>
        </div>
      </div>
      <DesignCanvas>
        <DCSection id="vault" title="Vault" subtitle="Feed · fresh post · empty">
          {states.map(s => (
            <DCArtboard key={s.id} id={s.id} label={s.label} width={ARTBOARD_W} height={ARTBOARD_H}>
              <div className="v-frame" data-screen-label={`Vault · ${s.label}`}>
                <AppShell active="vault" user={{ name: 'Sara Lindqvist' }} topbarCrumbs={['Vault']}>
                  <VaultPage data={s.data} view={s.view} />
                </AppShell>
              </div>
            </DCArtboard>
          ))}
        </DCSection>

        <DCSection id="flows" title="Compose · post detail" subtitle="Writing a post; reading a post with its thread">
          <DCArtboard id="compose" label="Compose — writing an idea (form shapes itself to the kind)" width={ARTBOARD_W} height={1700}>
            <div className="v-frame" data-screen-label="Vault · compose">
              <AppShell active="vault" user={{ name: 'Sara Lindqvist' }} topbarCrumbs={['Vault', 'New post']}>
                <VaultCompose draft={COMPOSE_DRAFT_IDEA} />
              </AppShell>
            </div>
          </DCArtboard>
          <DCArtboard id="detail" label="Post detail — Maya's idea with its full comment thread" width={ARTBOARD_W} height={1700}>
            <div className="v-frame" data-screen-label="Vault · post detail">
              <AppShell active="vault" user={{ name: 'Sara Lindqvist' }} topbarCrumbs={['Vault', 'A sound bible per project']}>
                <VaultPostDetail post={POST_DETAIL} comments={POST_COMMENTS} viewer="Sara Lindqvist" />
              </AppShell>
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
