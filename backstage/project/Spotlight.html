<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<title>Crew OS — Spotlight</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; font-family: "Geist", -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
  .sp-frame { width: 100%; height: 100%; overflow: hidden; }
  .sp-block-frame { width: 100%; padding: 32px; background: #F7F6F2; min-height: 100%; }
  .sp-intro { max-width: 1100px; margin: 32px auto 8px; padding: 0 28px; color: #2a251f; }
  .sp-intro h1 { font-size: 22px; font-weight: 500; margin: 0 0 6px 0; letter-spacing: -0.01em; }
  .sp-intro p  { font-size: 13px; color: rgba(60,50,40,0.7); margin: 0; max-width: 720px; line-height: 1.5; }
  .sp-intro .meta { margin-top: 10px; display: flex; gap: 14px; font-size: 11px; color: rgba(60,50,40,0.55); flex-wrap: wrap; }
  .sp-intro .meta span::before { content: '·'; margin-right: 14px; }
  .sp-intro .meta span:first-child::before { content: ''; margin: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="spotlight-block.jsx"></script>
<script type="text/babel" src="spotlight-flows.jsx"></script>
<script type="text/babel" src="spotlight-states.jsx"></script>

<script type="text/babel" data-presets="env,react">
const BLOCK_W = 900;
const BLOCK_H = 280;
const FULL_W = 1380;
const FULL_H = 1100;

function Page() {
  return (
    <React.Fragment>
      <div className="sp-intro">
        <h1>Spotlight <span style={{fontSize:12,color:'rgba(60,50,40,0.55)',marginLeft:8}}>§6.9 · light theme</span></h1>
        <p>
          The recognition feature. Lives mainly as a block at the bottom of
          every Cockpit so people see it daily. Two-step flow: a lead
          nominates, an admin confirms. A simple history sits under Crew.
        </p>
        <div className="meta">
          <span>SKAM light</span>
          <span>Red is permitted here — recognition earns attention (§3.5)</span>
          <span>Three Cockpit-block states + nominate + confirm + history</span>
        </div>
      </div>
      <DesignCanvas>
        <DCSection id="block" title="Cockpit-embedded block" subtitle="Three states · 980px column">
          <DCArtboard id="block-current" label="Block — current spotlight (viewer is not the spotlit person)" width={BLOCK_W} height={BLOCK_H}>
            <div className="sp-block-frame" data-screen-label="Spotlight block · current">
              <div style={{ maxWidth: 836, margin: '0 auto' }}>
                <SpotlightBlock spotlight={SPOTLIGHT_CURRENT} viewerName="Sara Lindqvist" />
              </div>
            </div>
          </DCArtboard>
          <DCArtboard id="block-you" label="Block — you are spotlit (warm red treatment)" width={BLOCK_W} height={BLOCK_H}>
            <div className="sp-block-frame" data-screen-label="Spotlight block · you">
              <div style={{ maxWidth: 836, margin: '0 auto' }}>
                <SpotlightBlock spotlight={SPOTLIGHT_TEAM} viewerName="Maya Okafor" />
              </div>
            </div>
          </DCArtboard>
          <DCArtboard id="block-none" label="Block — no current spotlight (calm)" width={BLOCK_W} height={BLOCK_H}>
            <div className="sp-block-frame" data-screen-label="Spotlight block · none">
              <div style={{ maxWidth: 836, margin: '0 auto' }}>
                <SpotlightBlock spotlight={null} viewerName="Sara Lindqvist" />
              </div>
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="flows" title="Nominate · confirm · history" subtitle="Lead flow + admin flow + the Crew history page">
          <DCArtboard id="nominate" label="Lead's nominate flow" width={FULL_W} height={FULL_H}>
            <div className="sp-frame" data-screen-label="Spotlight · nominate">
              <AppShell active="crew" subActive="spotlight" user={{ name: 'Ada Brennan' }} topbarCrumbs={['Crew', 'Spotlight', 'Nominate']}>
                <NominatePage draft={NOMINATE_DRAFT} />
              </AppShell>
            </div>
          </DCArtboard>
          <DCArtboard id="confirm" label="Admin's confirm view — pending nominations" width={FULL_W} height={FULL_H}>
            <div className="sp-frame" data-screen-label="Spotlight · admin confirm">
              <AppShell active="crew" subActive="spotlight" user={{ name: 'Marko Pavlović' }} topbarCrumbs={['Crew', 'Spotlight']}>
                <AdminConfirmPage data={{ current: SPOTLIGHT_CURRENT, pending: PENDING }} />
              </AppShell>
            </div>
          </DCArtboard>
          <DCArtboard id="history" label="Spotlight history (under Crew)" width={FULL_W} height={FULL_H}>
            <div className="sp-frame" data-screen-label="Spotlight · history">
              <AppShell active="crew" subActive="spotlight" user={{ name: 'Sara Lindqvist' }} topbarCrumbs={['Crew', 'Spotlight', 'History']}>
                <HistoryPage history={SPOTLIGHT_HISTORY} />
              </AppShell>
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
