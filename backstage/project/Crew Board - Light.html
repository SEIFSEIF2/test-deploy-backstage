<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<title>Crew OS — Crew Board (light)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; height: 100%; background: #f0eee9; font-family: "Geist", -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
  .cb-frame { width: 100%; height: 100%; overflow: hidden; }
  .cb-intro { max-width: 1100px; margin: 32px auto 8px; padding: 0 28px; font-family: "Geist", -apple-system, system-ui, sans-serif; color: #2a251f; }
  .cb-intro h1 { font-size: 22px; font-weight: 500; margin: 0 0 6px 0; letter-spacing: -0.01em; }
  .cb-intro p  { font-size: 13px; color: rgba(60,50,40,0.7); margin: 0; max-width: 720px; line-height: 1.5; }
  .cb-intro .meta { margin-top: 10px; display: flex; gap: 14px; font-size: 11px; color: rgba(60,50,40,0.55); flex-wrap: wrap; }
  .cb-intro .meta span::before { content: '·'; margin-right: 14px; }
  .cb-intro .meta span:first-child::before { content: ''; margin: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="crew-board.jsx"></script>
<script type="text/babel" src="crew-board-capacity.jsx"></script>
<script type="text/babel" src="crew-board-sections.jsx"></script>
<script type="text/babel" src="crew-board-states.jsx"></script>

<script type="text/babel" data-presets="env,react">
function Page() {
  const states = [
    { id: 'default',  label: 'Default — balanced May',        data: CB_DEFAULT, month: 'May 2026', user: 'Ada Brennan' },
    { id: 'cliff',    label: 'Forecast cliff — September drop', data: CB_CLIFF,   month: 'Aug 2026', user: 'Ada Brennan' },
    { id: 'empty',    label: 'Empty — first run, no roles yet', data: CB_EMPTY,   month: 'May 2026', user: 'Ada Brennan' },
  ];

  const ARTBOARD_W = 1440;
  const ARTBOARD_H = 1500;

  return (
    <React.Fragment>
      <div className="cb-intro">
        <h1>Crew Board <span style={{fontSize:12,color:'rgba(60,50,40,0.55)',marginLeft:8}}>admin · §6.3</span></h1>
        <p>
          Staffing picture for one company. Summary metrics, capacity by role grouped by family,
          suggested redeployments, and a forecast that surfaces shortages before they happen
          because every person's end date is known.
        </p>
        <div className="meta">
          <span>SKAM light theme</span>
          <span>CapacityLight reused across rows, role chips, forecast cells</span>
          <span>Red appears only where a role is critical</span>
        </div>
      </div>
      <DesignCanvas>
        <DCSection id="crew-board" title="Crew Board" subtitle="Default · forecast cliff · empty">
          {states.map((s) => (
            <DCArtboard
              key={s.id}
              id={s.id}
              label={s.label}
              width={ARTBOARD_W}
              height={ARTBOARD_H}
            >
              <div className="cb-frame" data-screen-label={`Crew Board · ${s.label}`}>
                <AppShell active="crew" subActive="crew-board" user={{ name: s.user }} topbarCrumbs={['Crew', 'Crew Board']}>
                  <CrewBoard data={s.data} viewMonth={s.month} />
                </AppShell>
              </div>
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page />);
</script>
</body>
</html>
