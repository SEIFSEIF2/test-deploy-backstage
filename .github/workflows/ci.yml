name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Dummy values so a fresh clone builds without any real backend.
      # scripts/migrate.mjs skips when no POSTGRES_URL is set, and no
      # build-time code path talks to Supabase.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-key
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm exec prettier --check "app/**/*.{ts,tsx}" "lib/**/*.{ts,tsx}" "components/**/*.{ts,tsx}" "supabase/**/*.ts" "plugins/**/*.{ts,tsx}" "test/**/*.ts"
      - run: pnpm test
      - run: pnpm build
