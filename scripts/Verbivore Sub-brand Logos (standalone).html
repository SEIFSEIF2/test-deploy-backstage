document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

font-weight:600; font-size:16px; margin-top:18px; }\n  .ftile .role{ font-family:var(--mono); font-size:11px; letter-spacing:.04em; color:var(--muted); margin-top:3px; }\n  .ftile .swatchline{ font-family:var(--mono); font-size:10px; letter-spacing:.05em; color:var(--muted); margin-top:10px; opacity:.85; }\n  .ftile .pill{ font-family:var(--mono); font-size:10px; letter-spacing:.06em; padding:2px 8px; border-radius:20px; margin-top:8px; }\n\n  /* ---- lockups ---- */\n  .lockrow{ display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-top:14px; }\n  .lock{ display:flex; align-items:center; gap:11px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:13px 16px; }\n  .lock .mk{ width:38px; height:38px; flex:0 0 38px; }\n  .lock .wm{ font-family:\"Fredoka\",sans-serif; font-weight:600; font-size:18px; letter-spacing:-.01em; line-height:1; }\n  .lock .tg{ font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:lowercase; margin-top:3px; display:inline-block; padding:1px 7px; border-radius:5px; }\n\n  /* ---- context: browser tabs ---- */\n  .context{ margin-top:42px; display:grid; grid-template-columns:1.55fr 1fr; gap:24px; }\n  @media (max-width:860px){ .context{ grid-template-columns:1fr; } .family,.lockrow{ grid-template-columns:repeat(2,1fr);} }\n  .ctx-card{ background:var(--card); border:1px solid var(--line); border-radius:18px; overflow:hidden; }\n  .ctx-card .cap{ font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); padding:14px 18px 0; }\n  .browser{ padding:14px 14px 18px; }\n  .bchrome{ background:color-mix(in oklab, var(--fg) 6%, transparent); border-radius:12px 12px 0 0; padding:9px 12px 0; }\n  .dots{ display:flex; gap:6px; margin-bottom:9px; }\n  .dots i{ width:11px; height:11px; border-radius:50%; background:color-mix(in oklab, var(--fg) 18%, transparent); }\n  .tabstrip{ display:flex; gap:4px; }\n  .btab{ display:flex; align-items:center; gap:8px; padding:9px 13px; border-radius:9px 9px 0 0; font-size:12.5px; background:color-mix(in oklab, var(--fg) 5%, transparent); color:var(--muted); white-space:nowrap; }\n  .btab.active{ background:var(--card); color:var(--fg); box-shadow:0 -1px 0 var(--line); font-weight:600; }\n  .btab .fav{ width:17px; height:17px; flex:0 0 17px; border-radius:4px; }\n  .burl{ background:var(--card); border-bottom-left-radius:12px; border-bottom-right-radius:12px; padding:11px 14px; display:flex; align-items:center; gap:9px; }\n  .burl .bar{ flex:1; height:24px; border-radius:13px; background:color-mix(in oklab, var(--fg) 7%, transparent); display:flex; align-items:center; padding:0 12px; font-family:var(--mono); font-size:11px; color:var(--muted); gap:8px; }\n  .burl .bar .ic{ width:13px; height:13px; border-radius:3px; }\n\n  /* ---- context: sidebar rail ---- */\n  .rail-wrap{ padding:18px; }\n  .rail{ display:flex; gap:14px; }\n  .rail .bar{ background:color-mix(in oklab, var(--fg) 6%, transparent); border-radius:16px; padding:14px 10px; display:flex; flex-direction:column; align-items:center; gap:14px; }\n  .rail .ic{ width:40px; height:40px; border-radius:11px; position:relative; cursor:default; }\n  .rail .ic.sel::before{ content:\"\"; position:absolute; left:-10px; top:50%; transform:translateY(-50%); width:4px; height:22px; border-radius:3px; background:var(--accent,var(--teal)); }\n  .rail .list{ flex:1; display:flex; flex-direction:column; gap:9px; padding-top:4px; }\n  .rail .li{ display:flex; align-items:center; gap:11px; font-size:13.5px; color:var(--muted); }\n  .rail .li .ic{ width:24px; height:24px; border-radius:7px; }\n  .rail .li.on{ color:var(--fg); font-weight:600; }\n  .rail .li.on .label::after{ content:\"\"; }\n\n  /* favicon scale row */\n  .favrow{ display:flex; align-items:flex-end; gap:18px; margin-top:16px; padding:14px 0 0; }\n  .favrow .fitem{ display:flex; flex-direction:column; align-items:center; gap:7px; }\n  .favrow .fitem span{ font-family:var(--mono); font-size:9px; color:var(--muted); }\n\n  footer.reco{ margin-top:54px; background:var(--card); border:1px solid var(--line); border-radius:20px; padding:30px 32px; display:flex; gap:26px; align-items:flex-start; flex-wrap:wrap; }\n  footer.reco .mk{ width:64px; height:64px; flex:0 0 64px; }\n  footer.reco h4{ font-family:\"Fredoka\",sans-serif; font-size:18px; margin:0 0 8px; }\n  footer.reco p{ margin:0 0 6px; color:var(--muted); font-size:14.5px; max-width:760px; }\n  footer.reco b{ color:var(--fg); }\n  .k{ font-family:var(--mono); font-size:12.5px; background:color-mix(in oklab,var(--teal) 22%, transparent); color:var(--teal-dark); padding:1px 6px; border-radius:5px; }\n  [data-theme=\"dark\"] .k{ color:#bfe7e2; }\n<\u002Fstyle>\n<\u002Fhead>\n<body data-theme=\"cream\">\n  \n  <div class=\"wrap\">\n    <header class=\"top\">\n      <h1>Verbivore sub-brands<span class=\"sub\">one dino · four front doors<\u002Fspan><\u002Fh1>\n      <div class=\"controls\">\n        <span class=\"ctl-label\">Canvas<\u002Fspan>\n        <div class=\"seg\" id=\"themeSeg\">\n          <button data-theme-val=\"cream\" aria-pressed=\"true\">Cream<\u002Fbutton>\n          <button data-theme-val=\"white\" aria-pressed=\"false\">White<\u002Fbutton>\n          <button data-theme-val=\"dark\" aria-pressed=\"false\">Dark<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <p class=\"lede\">Same brontosaurus, same rounded badge — but each internal tool gets a <b>distinct, instantly-readable identity<\u002Fb> so a row of tabs or a sidebar never leaves you guessing. Below are four ways to differentiate <b>Backstage<\u002Fb>, <b>Dashboard<\u002Fb> and <b>Docs<\u002Fb> from the main <b>verbivore<\u002Fb> mark. Switch tabs to compare.<\u002Fp>\n\n    <section class=\"system\">\n      <h2>Core palette · everything stays in the family<\u002Fh2>\n      <div class=\"chips\">\n        <div class=\"chip\"><div class=\"sw\" style=\"background:#6BBBB4\"><\u002Fdiv><div class=\"meta\"><span class=\"n\">Brand teal<\u002Fspan><span class=\"h\">#6BBBB4<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"chip\"><div class=\"sw\" style=\"background:#295E5E\"><\u002Fdiv><div class=\"meta\"><span class=\"n\">Deep teal<\u002Fspan><span class=\"h\">#295E5E<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"chip\"><div class=\"sw\" style=\"background:#948CC0\"><\u002Fdiv><div class=\"meta\"><span class=\"n\">Backstage violet<\u002Fspan><span class=\"h\">muted · sibling<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"chip\"><div class=\"sw\" style=\"background:#74A4C9\"><\u002Fdiv><div class=\"meta\"><span class=\"n\">Dashboard blue<\u002Fspan><span class=\"h\">muted · sibling<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"chip\"><div class=\"sw\" style=\"background:#CBA86B\"><\u002Fdiv><div class=\"meta\"><span class=\"n\">Docs amber<\u002Fspan><span class=\"h\">muted · sibling<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <nav class=\"tabs\" id=\"tabs\" role=\"tablist\"><\u002Fnav>\n    <div id=\"panels\"><\u002Fdiv>\n\n    <footer class=\"reco\">\n      <span id=\"footMark\"><\u002Fspan>\n      <div>\n        <h4>My recommendation<\u002Fh4>\n        <p>Ship <b>Direction 1 (Color family)<\u002Fb> as the default — a single hue per tool is the cheapest thing for the eye to decode and it scales perfectly down to a <span class=\"k\">16px<\u002Fspan> favicon, which is exactly where the confusion bites. Keep the main app on <b>teal<\u002Fb> so it stays \"home base.\"<\u002Fp>\n        <p>If you want belt-and-suspenders clarity in dense tab strips, use <b>Direction 4 (Colour + badge)<\u002Fb> — the tiny task / chart / doc glyph reinforces the colour without changing the silhouette. <b>Direction 3<\u002Fb> is the move if you'd rather not introduce any new colour at all.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Ffooter>\n  <\u002Fdiv>\n\n<script>\nconst P = \"M34 23 L21 36 L11 51 L4 67 L2 82 L0 83 L0 195 L20 179 L38 167 L66 152 L85 145 L114 140 L135 141 L146 144 L151 144 L171 151 L194 163 L218 179 L256 208 L258 208 L274 220 L276 220 L294 231 L310 237 L315 237 L325 240 L348 240 L358 237 L363 237 L382 229 L400 218 L410 207 L414 199 L417 188 L417 168 L414 156 L408 149 L404 149 L399 152 L386 152 L375 149 L371 146 L370 143 L371 138 L369 136 L370 129 L381 116 L387 115 L391 112 L395 112 L403 115 L412 115 L415 121 L428 135 L440 158 L444 176 L444 195 L440 215 L434 228 L434 231 L421 250 L404 266 L385 279 L359 292 L356 292 L344 298 L340 298 L328 303 L319 304 L300 309 L295 314 L294 341 L297 354 L298 374 L300 380 L314 394 L314 397 L311 401 L305 400 L300 402 L280 403 L276 398 L276 377 L274 372 L260 352 L259 341 L261 336 L261 330 L258 326 L254 326 L250 329 L242 339 L241 365 L242 373 L245 381 L259 396 L261 401 L259 403 L247 403 L246 404 L244 403 L224 403 L221 402 L217 398 L216 388 L212 380 L204 355 L203 341 L205 337 L205 332 L202 329 L196 327 L182 326 L170 322 L151 322 L134 326 L135 329 L134 344 L131 359 L126 372 L126 379 L143 400 L141 402 L129 402 L128 403 L121 402 L90 403 L87 400 L89 383 L89 362 L86 344 L87 337 L86 329 L82 329 L78 333 L73 349 L65 366 L65 375 L71 387 L71 394 L63 398 L56 396 L45 397 L31 395 L27 391 L27 382 L33 371 L31 361 L31 349 L35 332 L23 327 L2 327 L0 328 L0 382 L2 383 L4 398 L9 410 L15 421 L24 433 L31 440 L46 451 L58 457 L80 463 L383 463 L405 457 L418 450 L429 442 L441 430 L454 410 L460 393 L462 378 L462 88 L460 73 L455 61 L455 58 L448 45 L439 33 L425 20 L404 8 L387 3 L371 2 L370 0 L92 0 L91 2 L81 2 L59 8 L45 15 Z\";\n\n// ---- mark builder (each mark is fully self-contained & portable) ----------\nlet _uid = 0;\nfunction badge(type, bg){\n  const cx=356, cy=358, r=98;\n  let g='';\n  if(type==='check') g=`<path d=\"M${cx-48} ${cy} L${cx-14} ${cy+34} L${cx+52} ${cy-40}\" fill=\"none\" stroke=\"#fff\" stroke-width=\"28\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>`;\n  if(type==='bars') g=`<g fill=\"#fff\"><rect x=\"${cx-48}\" y=\"${cy-2}\" width=\"24\" height=\"42\" rx=\"6\"/><rect x=\"${cx-12}\" y=\"${cy-28}\" width=\"24\" height=\"68\" rx=\"6\"/><rect x=\"${cx+24}\" y=\"${cy-48}\" width=\"24\" height=\"88\" rx=\"6\"/><\u002Fg>`;\n  if(type==='lines') g=`<g fill=\"#fff\"><rect x=\"${cx-48}\" y=\"${cy-36}\" width=\"96\" height=\"19\" rx=\"9.5\"/><rect x=\"${cx-48}\" y=\"${cy-5}\" width=\"96\" height=\"19\" rx=\"9.5\"/><rect x=\"${cx-48}\" y=\"${cy+26}\" width=\"62\" height=\"19\" rx=\"9.5\"/><\u002Fg>`;\n  return `<circle cx=\"${cx}\" cy=\"${cy}\" r=\"${r}\" fill=\"${bg}\" stroke=\"#fff\" stroke-width=\"16\"/>${g}`;\n}\nfunction mark(o){\n  const r = '18.4%';\n  const sqFill = o.sq==='none' ? 'transparent' : o.sq;\n  const bdg = o.badge ? badge(o.badge, o.badgeBg) : '';\n  const border = o.border ? `<rect x=\"13\" y=\"13\" width=\"437\" height=\"438\" rx=\"70\" fill=\"none\" stroke=\"${o.border}\" stroke-width=\"26\"/>` : '';\n  // div background = dino colour; the path paints the square colour over everything except the dino hole\n  return `<div class=\"${o.cls||'mark'}\" style=\"background:${o.dino};border-radius:${r};position:relative;overflow:hidden\">\n    <svg viewBox=\"0 0 463 464\" style=\"display:block;width:100%;height:100%\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"${P}\" fill=\"${sqFill}\" fill-rule=\"evenodd\"/>${border}${bdg}<\u002Fsvg>\n  <\u002Fdiv>`;\n}\n\n// ---- palette ----\nconst C = {\n  teal:'#6BBBB4', tealDark:'#295E5E',\n  violet:'#948CC0', violetDark:'#4B4677',\n  blue:'#74A4C9', blueDark:'#305A79',\n  amber:'#CBA86B', amberDark:'#6E5C30',\n};\n\n// tool meta shared across directions\nconst TOOLS = [\n  {key:'main',      nm:'verbivore', tag:'',          role:'Main · learn.verbivore.app', hue:'teal',   badge:null,    url:'learn.verbivore.app'},\n  {key:'backstage', nm:'verbivore', tag:'backstage', role:'Team tasks · Linear-style',  hue:'violet', badge:'check', url:'backstage.verbivore.app'},\n  {key:'dashboard', nm:'verbivore', tag:'dashboard', role:'Frontend metrics',           hue:'blue',   badge:'bars',  url:'dashboard.verbivore.app'},\n  {key:'docs',      nm:'verbivore', tag:'docs',      role:'Developer docs',             hue:'amber',  badge:'lines', url:'docs.verbivore.app'},\n];\n\n// build the per-direction mark options for a tool\nfunction optsFor(dir, t){\n  const hue = t.hue, base = C[hue], dark = C[hue+'Dark'] || C.tealDark;\n  if(dir===1){ // colour family — white dino, coloured square\n    return {sq:base, dino:'#fff', ink:dark, accent:base, swatch:base.toUpperCase()};\n  }\n  if(dir===2){ // teal + badge\n    return {sq:C.teal, dino:'#fff', badge:t.badge, badgeBg:dark, ink:C.tealDark, accent:base, swatch:'teal + '+hue};\n  }\n  if(dir===3){ // treatment / mono-teal weight\n    const m = {\n      main:      {sq:C.teal,     dino:'#fff'},                     // solid\n      backstage: {sq:'#fff',     dino:C.teal, border:C.teal},      // inverse / outline\n      dashboard: {sq:C.teal,     dino:C.tealDark},                 // duotone\n      docs:      {sq:C.tealDark, dino:C.teal},                     // deep\n    }[t.key];\n    return {...m, ink:C.tealDark, accent:C.teal, swatch:{main:'solid',backstage:'inverse',dashboard:'duotone',docs:'deep'}[t.key]};\n  }\n  // dir 4 — colour + badge\n  return {sq:base, dino:'#fff', badge:t.badge, badgeBg:dark, ink:dark, accent:base, swatch:base.toUpperCase()};\n}\n\nconst DIRS = [\n  {n:1, name:'Colour family', rec:true,\n   blurb:'Keep the dino white, swap the badge colour. One muted sibling hue per tool — violet, blue, amber — all tuned to sit beside the brand teal.',\n   note:'cheapest for the eye to decode, and survives down to a 16px favicon.'},\n  {n:2, name:'Teal + symbol badge',\n   blurb:'Stay 100% on brand teal everywhere, and clip a small corner badge — a task check, a chart, doc lines — onto each tool. Most \"Verbivore\", least loud.',\n   note:'very on-brand, but at favicon size the badge shrinks away and they all read teal.'},\n  {n:3, name:'One colour, four weights',\n   blurb:'No new colours at all. Differentiate by treatment: solid, outline, duotone, and deep-inverted — same teal, different \"weight\".',\n   note:'maximally cohesive — but outline/duotone get subtle when tiny.'},\n  {n:4, name:'Colour + badge',\n   blurb:'Belt & suspenders: the per-tool colour from Direction 1 plus the glyph from Direction 2. Redundant on purpose, so it never fails in a dense tab strip.',\n   note:'the most bulletproof for crowded sidebars and tab rows.'},\n];\n\n// ---------- render ----------\nconst tabsEl = document.getElementById('tabs');\nconst panelsEl = document.getElementById('panels');\n\nDIRS.forEach((d,i)=>{\n  const b=document.createElement('button');\n  b.setAttribute('role','tab');\n  b.setAttribute('aria-selected', i===0?'true':'false');\n  b.dataset.idx=i;\n  b.innerHTML=`<span class=\"num\">0${d.n}<\u002Fspan>${d.name}${d.rec?'<span class=\"rec\">RECOMMENDED<\u002Fspan>':''}`;\n  b.onclick=()=>select(i);\n  tabsEl.appendChild(b);\n});\n\nfunction favSet(dir){\n  // returns html for favicon scale row using backstage as the example\n  const t = TOOLS[1];\n  const o = optsFor(dir,t);\n  return `<div class=\"favrow\">\n    ${[64,32,24,16].map(s=>`<div class=\"fitem\"><div style=\"width:${s}px;height:${s}px\">${mark({...o, cls:'mfill'})}<\u002Fdiv><span>${s}px<\u002Fspan><\u002Fdiv>`).join('')}\n    <div class=\"fitem\" style=\"margin-left:6px\"><span style=\"font-family:Caveat,cursive;font-size:18px;color:var(--accent)\">still legible →<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction panelHTML(d){\n  const dir=d.n;\n  // family tiles\n  const fam = TOOLS.map(t=>{\n    const o=optsFor(dir,t);\n    const isMain = t.key==='main';\n    return `<div class=\"ftile ${isMain?'main':''}\">\n      ${mark(o)}\n      <div class=\"nm\">${t.nm}${t.tag?` <span style=\"color:${o.ink};font-weight:500\">${t.tag}<\u002Fspan>`:''}<\u002Fdiv>\n      <div class=\"role\">${t.role}<\u002Fdiv>\n      <div class=\"pill\" style=\"background:color-mix(in oklab, ${o.accent} 20%, transparent); color:${o.ink}\">${o.swatch}<\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n\n  // lockups\n  const locks = TOOLS.map(t=>{\n    const o=optsFor(dir,t);\n    return `<div class=\"lock\">\n      <div class=\"mk\">${mark({...o,cls:'mk'})}<\u002Fdiv>\n      <div>\n        <div class=\"wm\" style=\"color:${o.ink}\">${t.nm}<\u002Fdiv>\n        ${t.tag?`<span class=\"tg\" style=\"background:color-mix(in oklab, ${o.accent} 22%, transparent); color:${o.ink}\">${t.tag}<\u002Fspan>`:`<span class=\"tg\" style=\"background:color-mix(in oklab, ${o.accent} 18%, transparent); color:${o.ink}\">main<\u002Fspan>`}\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n\n  // browser tab strip\n  const tabsHTML = TOOLS.map((t,i)=>{\n    const o=optsFor(dir,t);\n    const fav = mark({...o}).replace('class=\"mark\"','class=\"fav\"');\n    const name = t.tag?`${t.tag[0].toUpperCase()+t.tag.slice(1)}`:'Verbivore';\n    return `<div class=\"btab ${i===1?'active':''}\">${fav}<span>${name}<\u002Fspan><\u002Fdiv>`;\n  }).join('');\n  const activeO = optsFor(dir,TOOLS[1]);\n  const urlFav = mark({...activeO}).replace('class=\"mark\"','class=\"ic\"');\n\n  // sidebar rail\n  const railIcons = TOOLS.map((t,i)=>{\n    const o=optsFor(dir,t);\n    return mark({...o}).replace('class=\"mark\"',`class=\"ic ${i===0?'sel':''}\"`);\n  }).join('');\n  const railList = TOOLS.map((t,i)=>{\n    const o=optsFor(dir,t);\n    const name = t.tag?(t.tag[0].toUpperCase()+t.tag.slice(1)):'Home';\n    return `<div class=\"li ${i===0?'on':''}\">${mark({...o}).replace('class=\"mark\"','class=\"ic\"')}<span class=\"label\">${name}<\u002Fspan><\u002Fdiv>`;\n  }).join('');\n\n  return `<div class=\"panel\" data-active=\"false\" data-accent=\"${optsFor(dir,TOOLS[1]).accent}\">\n    <div class=\"panel-head\">\n      <div class=\"desc\"><h3>0${d.n} · ${d.name}<\u002Fh3><p>${d.blurb}<\u002Fp><\u002Fdiv>\n      <div class=\"note\">${d.note}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"family\">${fam}<\u002Fdiv>\n    ${favSet(dir)}\n    <div class=\"lockrow\">${locks}<\u002Fdiv>\n\n    <div class=\"context\">\n      <div class=\"ctx-card\">\n        <div class=\"cap\">The tab test · can you tell them apart?<\u002Fdiv>\n        <div class=\"browser\">\n          <div class=\"bchrome\">\n            <div class=\"dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv>\n            <div class=\"tabstrip\">${tabsHTML}<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"burl\"><div class=\"bar\">${urlFav}<span>${TOOLS[1].url}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ctx-card\">\n        <div class=\"cap\">App switcher / sidebar rail<\u002Fdiv>\n        <div class=\"rail-wrap\">\n          <div class=\"rail\">\n            <div class=\"bar\">${railIcons}<\u002Fdiv>\n            <div class=\"list\">${railList}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\npanelsEl.innerHTML = DIRS.map(panelHTML).join('');\nconst panelNodes = [...panelsEl.querySelectorAll('.panel')];\n\nfunction select(i){\n  [...tabsEl.children].forEach((b,j)=>b.setAttribute('aria-selected', j===i?'true':'false'));\n  panelNodes.forEach((p,j)=>p.dataset.active = j===i?'true':'false');\n  const accent = panelNodes[i].dataset.accent;\n  tabsEl.style.setProperty('--accent', accent);\n  // accent the active tab underline + notes\n  panelNodes[i].style.setProperty('--accent', accent);\n}\nselect(0);\n// give every panel its own accent for notes\npanelNodes.forEach(p=>p.style.setProperty('--accent', p.dataset.accent));\n\n// footer mark\ndocument.getElementById('footMark').innerHTML = mark({sq:C.teal, dino:'#fff', cls:'mk'});\n\n// theme switch\ndocument.getElementById('themeSeg').addEventListener('click', e=>{\n  const btn=e.target.closest('button'); if(!btn) return;\n  document.body.dataset.theme = btn.dataset.themeVal;\n  [...e.currentTarget.children].forEach(b=>b.setAttribute('aria-pressed', b===btn?'true':'false'));\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
